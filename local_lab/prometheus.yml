global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: otel-collector-exporter
    static_configs:
      - targets:
          - otel-collector:8889
  - job_name: otel-collector-internal
    static_configs:
      - targets:
          - otel-collector:8888
  - job_name: hello-telemetry
    static_configs:
      - targets:
          - hello-telemetry:8000
